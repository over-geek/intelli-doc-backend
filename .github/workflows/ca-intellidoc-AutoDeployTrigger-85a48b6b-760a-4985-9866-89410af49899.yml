name: Build and Deploy Backend to ca-intellidoc

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/ca-intellidoc-deploy.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2
      
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'termurin'
      
      - name: Build with Maven
        run: mvn clean package -DskipTests
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CAINTELLIDOC_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CAINTELLIDOC_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CAINTELLIDOC_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to ACR
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: Dockerfile
          registryUrl: acrintellidoc.azurecr.io
          registryUsername: ${{ secrets.CAINTELLIDOC_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CAINTELLIDOC_REGISTRY_PASSWORD }}
          containerAppName: ca-intellidoc
          resourceGroup: rg-intellidoc
          imageToBuild: acrintellidoc.azurecr.io/ca-intellidoc:${{ github.sha }}
          targetPort: 8080


