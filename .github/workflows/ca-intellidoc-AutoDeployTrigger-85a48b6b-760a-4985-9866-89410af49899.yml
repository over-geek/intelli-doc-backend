name: Build and Deploy Backend to ca-intellidoc

on:
  push:
    branches:
      - main
    paths:
      - '**'
      - '.github/workflows/ca-intellidoc-deploy.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.CAINTELLIDOC_AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.CAINTELLIDOC_AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.CAINTELLIDOC_AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.CAINTELLIDOC_AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Build and push container image to ACR
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: Dockerfile
          registryUrl: acrintellidoc.azurecr.io
          registryUsername: ${{ secrets.CAINTELLIDOC_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CAINTELLIDOC_REGISTRY_PASSWORD }}
          containerAppName: ca-intellidoc
          resourceGroup: rg-intellidoc
          imageToBuild: acrintellidoc.azurecr.io/ca-intellidoc:${{ github.sha }}
          targetPort: 8080
