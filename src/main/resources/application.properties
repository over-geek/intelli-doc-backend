spring.application.name=intellidoc
spring.main.banner-mode=off
spring.config.import=optional:file:.env.properties[.properties]
spring.autoconfigure.exclude=${INTELLIDOC_SPRING_AUTOCONFIG_EXCLUDES:org.springframework.ai.vectorstore.azure.autoconfigure.AzureVectorStoreAutoConfiguration}

server.port=${SERVER_PORT:8080}
server.shutdown=graceful

spring.lifecycle.timeout-per-shutdown-phase=30s
spring.mvc.problemdetails.enabled=true
spring.servlet.multipart.max-file-size=${intellidoc.upload.max-file-size:50MB}
spring.servlet.multipart.max-request-size=${intellidoc.upload.max-request-size:50MB}

intellidoc.key-vault.enabled=${INTELLIDOC_KEY_VAULT_ENABLED:true}
intellidoc.key-vault.endpoint=${INTELLIDOC_KEY_VAULT_ENDPOINT:https://kv-intellidoc.vault.azure.net/}
intellidoc.key-vault.managed-identity-client-id=${AZURE_MANAGED_IDENTITY_CLIENT_ID:}
intellidoc.key-vault.tenant-id=${AZURE_RESOURCE_TENANT_ID:}
intellidoc.key-vault.required-secrets[0]=datasource-url
intellidoc.key-vault.required-secrets[1]=datasource-username
intellidoc.key-vault.required-secrets[2]=datasource-password
intellidoc.key-vault.required-secrets[3]=entra-issuer-uri
intellidoc.key-vault.required-secrets[4]=entra-jwk-set-uri
intellidoc.key-vault.required-secrets[5]=openai-endpoint
intellidoc.key-vault.required-secrets[6]=openai-api-key

spring.cloud.azure.credential.managed-identity-enabled=${intellidoc.key-vault.enabled}
spring.cloud.azure.credential.client-id=${intellidoc.key-vault.managed-identity-client-id}
spring.cloud.azure.profile.tenant-id=${intellidoc.key-vault.tenant-id}
spring.cloud.azure.keyvault.secret.property-source-enabled=${intellidoc.key-vault.enabled}
spring.cloud.azure.keyvault.secret.property-sources[0].enabled=${intellidoc.key-vault.enabled}
spring.cloud.azure.keyvault.secret.property-sources[0].endpoint=${intellidoc.key-vault.endpoint}

spring.datasource.url=${DATASOURCE_URL:${datasource-url:}}
spring.datasource.username=${DATASOURCE_USERNAME:${datasource-username:}}
spring.datasource.password=${DATASOURCE_PASSWORD:${datasource-password:}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-migration-naming=true
spring.flyway.baseline-on-migrate=true

spring.security.oauth2.resourceserver.jwt.issuer-uri=${ENTRA_ISSUER_URI:${entra-issuer-uri:}}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${ENTRA_JWK_SET_URI:${entra-jwk-set-uri:}}

spring.data.redis.host=${REDIS_HOST:${redis-host:localhost}}
spring.data.redis.port=${REDIS_PORT:${redis-port:6379}}
spring.data.redis.password=${REDIS_PASSWORD:${redis-password:}}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:${redis-ssl-enabled:false}}

spring.ai.azure.openai.endpoint=${OPENAI_ENDPOINT:${openai-endpoint:}}
spring.ai.azure.openai.api-key=${OPENAI_API_KEY:${openai-api-key:}}
spring.ai.azure.openai.chat.options.deployment-name=${intellidoc.ai.chat-deployment:gpt-4o}
spring.ai.azure.openai.embedding.options.deployment-name=${intellidoc.ai.embedding-deployment:text-embedding-3-large}
spring.ai.vectorstore.azure.url=${SEARCH_ENDPOINT:${search-endpoint:}}
spring.ai.vectorstore.azure.api-key=${SEARCH_API_KEY:${search-api-key:}}
spring.ai.vectorstore.azure.index-name=${search-index-name:intellidoc-chunks-index}

management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.health.redis.enabled=${INTELLIDOC_REDIS_ENABLED:false}

logging.level.root=INFO
logging.level.com.intellidoc=INFO
logging.level.org.springframework.security=INFO

intellidoc.security.allowed-origins=${frontend-allowed-origin:http://localhost:3000}
intellidoc.security.api-audience=${entra-api-audience:}
intellidoc.security.principal-claim-name=${entra-principal-claim-name:preferred_username}
intellidoc.storage.container-name=${storage-documents-container:documents}
intellidoc.storage.account-name=${storage-account-name:stintellidoc}
intellidoc.search.index-name=${search-index-name:intellidoc-chunks-index}
intellidoc.search.semantic-configuration=${search-semantic-configuration:intellidoc-semantic-config}
intellidoc.ai.chat-deployment=${openai-chat-deployment:gpt-4o}
intellidoc.ai.embedding-deployment=${openai-embedding-deployment:text-embedding-3-large}
intellidoc.ingestion.queue-name=${servicebus-ingestion-queue:ingestion-queue}
intellidoc.chat.session-ttl=30m
intellidoc.chat.conversation-window-size=5
intellidoc.upload.max-file-size=50MB
intellidoc.upload.max-request-size=50MB
intellidoc.observability.application-insights.enabled=${APPLICATIONINSIGHTS_ENABLED:true}
intellidoc.observability.application-insights.role-name=${APPLICATIONINSIGHTS_ROLE_NAME:intellidoc-backend}
intellidoc.observability.application-insights.role-instance=${APPLICATIONINSIGHTS_ROLE_INSTANCE:}
intellidoc.observability.application-insights.connection-string=${APPLICATIONINSIGHTS_CONNECTION_STRING:}
intellidoc.observability.environment=${INTELLIDOC_ENVIRONMENT:local}
